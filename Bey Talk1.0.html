<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bey Talk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== 主题变量系统 ==================== */
        :root, [data-theme="light"] {
            --bg-body: #f7f8fa; --bg-card: #ffffff; --bg-header: rgba(255,255,255,0.85);
            --bg-input: #ffffff; --bg-banner: #ffffff; --text-primary: #1d2129;
            --text-secondary: #4e5969; --text-tertiary: #86909c; --text-placeholder: #c9cdd4;
            --border-color: #e5e6eb; --border-light: rgba(0,0,0,0.04);
            --accent-color: #1d2129; --accent-hover: #000000; --btn-text: #ffffff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03); --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --logo-color: #1d2129; --delete-color: #86909c; --delete-hover: #f53f3f;
            --liked-color: #f53f3f; --collect-color: #ff7d00; --comment-border: #f2f3f5;
            --avatar-bg: #e5e6eb; --transition-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        [data-theme="dark"] {
            --bg-body: #0d0d0d; --bg-card: #1a1a1a; --bg-header: rgba(26,26,26,0.85);
            --bg-input: #1a1a1a; --bg-banner: #1a1a1a; --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0; --text-tertiary: #666666; --text-placeholder: #444444;
            --border-color: #2a2a2a; --border-light: rgba(255,255,255,0.06);
            --accent-color: #f0f0f0; --accent-hover: #ffffff; --btn-text: #0d0d0d;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2); --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
            --logo-color: #f0f0f0; --delete-color: #666666; --delete-hover: #ff4d4f;
            --liked-color: #ff4d4f; --collect-color: #ffb400; --comment-border: #2a2a2a;
            --avatar-bg: #2a2a2a; --transition-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-body); color: var(--text-primary); 
            line-height: 1.6; -webkit-font-smoothing: antialiased; 
            transition: background-color 0.4s ease, color 0.4s ease; overflow-x: hidden;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        /* ==================== 导航与Logo修复 ==================== */
        header { 
            background-color: var(--bg-header); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 12px 24px; margin-top: 24px; border-radius: 16px; 
            border: 1px solid var(--border-light); display: flex; 
            justify-content: space-between; align-items: center; 
            transition: all 0.4s var(--transition-spring); position: sticky; top: 24px; z-index: 100;
        }
        .logo-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        .logo-svg { width: 24px; height: 24px; fill: none; stroke: var(--logo-color); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-primary); }

        nav { display: flex; gap: 8px; align-items: center; }
        .nav-btn {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);
            padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; 
            transition: all 0.3s var(--transition-spring); white-space: nowrap;
        }
        .nav-btn:hover { border-color: var(--text-primary); color: var(--text-primary); transform: scale(1.05); }
        .nav-btn:active { transform: scale(0.95); }
        .user-info-nav { font-size: 13px; color: var(--text-secondary); font-weight: 600; margin-right: 4px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
        
        .theme-switcher { display: flex; gap: 2px; margin-left: 8px; background: var(--border-light); border-radius: 8px; padding: 2px; }
        .theme-btn {
            width: 32px; height: 32px; border: none; background: transparent; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--text-tertiary); font-size: 13px; transition: all 0.3s var(--transition-spring);
        }
        .theme-btn:hover { color: var(--text-primary); transform: scale(1.1); }
        .theme-btn.active { background: var(--bg-card); color: var(--text-primary); box-shadow: var(--shadow-sm); }

        /* ==================== 视图切换与物理动画 ==================== */
        .view { display: none; margin-top: 24px; min-height: 60vh; }
        .view.active { display: block; animation: viewEnter 0.5s var(--transition-spring) forwards; }
        @keyframes viewEnter {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ==================== 通用组件 ==================== */
        .welcome-banner {
            background: var(--bg-banner); padding: 40px 32px; border-radius: 16px; margin-bottom: 24px;
            border: 1px solid var(--border-light); transition: all 0.4s ease;
        }
        .welcome-banner h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
        .welcome-banner p { font-size: 14px; color: var(--text-secondary); }

        .search-box { position: relative; margin-bottom: 24px; }
        .search-box input {
            width: 100%; padding: 14px 16px 14px 44px; border: 1px solid var(--border-color); 
            border-radius: 12px; font-size: 14px; background: var(--bg-input); outline: none; 
            transition: all 0.3s var(--transition-spring); color: var(--text-primary);
        }
        .search-box input:focus { border-color: var(--text-primary); transform: scale(1.01); box-shadow: var(--shadow-md); }
        .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-placeholder); }

        .form-box { 
            background: var(--bg-card); padding: 32px; border-radius: 16px; 
            border: 1px solid var(--border-light); max-width: 420px; margin: 0 auto;
            transition: all 0.4s var(--transition-spring); box-shadow: var(--shadow-sm);
        }
        .form-box:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .form-box h2 { margin-bottom: 24px; color: var(--text-primary); text-align: center; font-size: 20px; font-weight: 700; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary); font-weight: 600; }
        .form-group input, .form-box textarea { 
            width: 100%; padding: 12px; border: 1px solid var(--border-color); 
            border-radius: 8px; font-family: inherit; font-size: 14px; outline: none;
            transition: all 0.3s var(--transition-spring); color: var(--text-primary); background: var(--bg-input);
        }
        .form-group input:focus, .form-box textarea:focus { border-color: var(--text-primary); transform: scale(1.01); }
        .form-box textarea { min-height: 140px; resize: vertical; line-height: 1.6; }
        .submit-btn { 
            width: 100%; padding: 14px; background-color: var(--accent-color); color: var(--btn-text); 
            border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600;
            transition: all 0.3s var(--transition-spring); margin-top: 8px;
        }
        .submit-btn:hover { background-color: var(--accent-hover); transform: scale(1.02); box-shadow: var(--shadow-md); }
        .submit-btn:active { transform: scale(0.98); }
        .switch-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-tertiary); }
        .switch-link a { color: var(--text-primary); cursor: pointer; text-decoration: none; font-weight: 700; transition: opacity 0.2s; }
        .switch-link a:hover { opacity: 0.7; }

        /* ==================== 帖子卡片 ==================== */
        .post-card { 
            background: var(--bg-card); padding: 24px; margin-bottom: 16px; 
            border-radius: 16px; border: 1px solid var(--border-light); 
            transition: all 0.3s var(--transition-spring); box-shadow: var(--shadow-sm);
        }
        .post-card:hover { border-color: var(--border-color); box-shadow: var(--shadow-md); transform: translateY(-3px); }
        .post-header { display: flex; align-items: center; margin-bottom: 14px; }
        .avatar { 
            width: 40px; height: 40px; background-color: var(--avatar-bg); border-radius: 10px; margin-right: 12px; 
            display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 15px;
            transition: transform 0.3s var(--transition-spring);
        }
        .post-card:hover .avatar { transform: scale(1.1) rotate(-5deg); }
        .user-info span { font-weight: 700; display: block; font-size: 15px; color: var(--text-primary); cursor: pointer; }
        .user-info small { color: var(--text-tertiary); font-size: 12px; }
        .post-content { margin-bottom: 16px; font-size: 15px; white-space: pre-wrap; color: var(--text-primary); line-height: 1.7; }
        .post-footer { display: flex; gap: 20px; border-top: 1px solid var(--comment-border); padding-top: 14px; align-items: center; }
        .action-btn { 
            background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 14px; 
            display: flex; align-items: center; gap: 6px; transition: all 0.3s var(--transition-spring); padding: 4px 8px; border-radius: 6px;
        }
        .action-btn:hover { color: var(--text-primary); background: var(--border-light); transform: scale(1.1); }
        .action-btn:active { transform: scale(0.9); }
        .action-btn.liked { color: var(--liked-color); }
        .action-btn.collected { color: var(--collect-color); }
        .delete-btn { margin-left: auto; }
        .delete-btn:hover { color: var(--delete-hover) !important; background: rgba(245,63,63,0.08) !important; }

        /* 评论区 */
        .comments-section { max-height: 0; overflow: hidden; transition: max-height 0.4s var(--transition-spring), padding 0.4s ease; }
        .comments-section.open { max-height: 1000px; padding-top: 16px; margin-top: 14px; border-top: 1px solid var(--comment-border); }
        .comment-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .comment-input-row input { flex: 1; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; outline: none; background: var(--bg-input); color: var(--text-primary); transition: all 0.3s; }
        .comment-input-row input:focus { border-color: var(--text-primary); }
        .comment-input-row button { background: var(--accent-color); color: var(--btn-text); border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s var(--transition-spring); }
        .comment-input-row button:hover { transform: scale(1.05); }
        .comment-item { margin-bottom: 12px; padding-left: 12px; border-left: 2px solid var(--comment-border); animation: viewEnter 0.3s ease; }
        .comment-item strong { font-size: 13px; color: var(--text-primary); margin-right: 8px; font-weight: 700; }
        .comment-item p { font-size: 13px; color: var(--text-secondary); display: inline; }
        .comment-item small { font-size: 11px; color: var(--text-tertiary); margin-left: 8px; }

        /* ==================== 个人主页 ==================== */
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; padding: 24px; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-light); }
        .profile-avatar { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #fff; }
        .profile-info h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .profile-info p { font-size: 13px; color: var(--text-tertiary); }
        .profile-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s var(--transition-spring); }
        .tab-btn.active { background: var(--accent-color); color: var(--btn-text); border-color: var(--accent-color); }
        .tab-btn:hover:not(.active) { border-color: var(--text-primary); color: var(--text-primary); transform: scale(1.05); }
        .pwd-form { max-width: 400px; background: var(--bg-card); padding: 24px; border-radius: 16px; border: 1px solid var(--border-light); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-wrap" onclick="switchView('home')">
                <svg class="logo-svg" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="3"/><path d="M7 17 L7 21 L11 17"/></svg>
                <span class="logo-text">Bey Talk</span>
            </div>
            <nav id="mainNav"></nav>
        </header>

        <!-- 首页 -->
        <div id="homeView" class="view active">
            <div class="welcome-banner" id="welcomeBanner">
                <h2>欢迎来到 Bey Talk</h2>
                <p>自由表达，分享灵感。点击右上角发帖，开启你的第一次交流。</p>
            </div>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="搜索帖子内容或作者...">
            </div>
            <div class="post-list" id="postList"></div>
        </div>

        <!-- 登录页 -->
        <div id="loginView" class="view">
            <div class="form-box">
                <h2>欢迎回来</h2>
                <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名"></div>
                <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码"></div>
                <button class="submit-btn" onclick="handleLogin()">登 录</button>
                <div class="switch-link">没有账号？<a onclick="switchView('register')">去注册</a></div>
            </div>
        </div>

        <!-- 注册页 -->
        <div id="registerView" class="view">
            <div class="form-box">
                <h2>创建账号</h2>
                <div class="form-group"><label>用户名</label><input type="text" id="regUsername" placeholder="设置你的用户名"></div>
                <div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="设置密码"></div>
                <button class="submit-btn" onclick="handleRegister()">注 册</button>
                <div class="switch-link">已有账号？<a onclick="switchView('login')">去登录</a></div>
            </div>
        </div>

        <!-- 发帖页 -->
        <div id="createView" class="view">
            <div class="form-box" style="max-width: 600px;">
                <h2>发布新帖子</h2>
                <div class="form-group">
                    <textarea id="newPostInput" placeholder="在 Bey Talk 分享你的想法、问题或灵感..." style="min-height: 180px;"></textarea>
                </div>
                <button class="submit-btn" onclick="createPost()">发 布</button>
            </div>
        </div>

        <!-- 个人主页 -->
        <div id="profileView" class="view">
            <div id="profileContent"></div>
        </div>
    </div>

    <script>
        // ==================== 状态管理 ====================
        let currentUser = JSON.parse(localStorage.getItem('beyTalkUser')) || null;
        let users = JSON.parse(localStorage.getItem('beyTalkUsers')) || [];
        // (1) 清空所有帖子，初始化空数组；增加 collections 字段
        let posts = JSON.parse(localStorage.getItem('beyTalkPosts')) || [];
        let currentTheme = localStorage.getItem('beyTalkTheme') || 'light';
        let profileTab = 'posts'; // posts | collected | settings

        const colors = ["#4e5969", "#1d2129", "#86909c", "#3370ff", "#722ed1", "#0fc6c2"];
        function getRandomColor() { return colors[Math.floor(Math.random() * colors.length)]; }

        // ==================== 主题 & 视图 & 导航 ====================
        function setTheme(theme) {
            if (theme !== 'light' && theme !== 'dark') theme = 'light';
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('beyTalkTheme', theme);
            updateNav();
        }

        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            const banner = document.getElementById('welcomeBanner');
            if (banner) banner.style.display = (viewName === 'home') ? 'block' : 'none';
            
            // 滚动到顶部并切换视图
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { 
                document.getElementById(viewName + 'View').classList.add('active'); 
                if (viewName === 'profile') renderProfile();
            }, 50);
            updateNav();
        }

        // (2) 修复导航栏重合问题：调整间距与最大宽度
        function updateNav() {
            const nav = document.getElementById('mainNav');
            if (!nav) return;
            const themeIcons = { light: 'fa-sun', dark: 'fa-moon' };
            let themeHTML = `<div class="theme-switcher">`;
            ['light', 'dark'].forEach(t => {
                themeHTML += `<button class="theme-btn ${currentTheme === t ? 'active' : ''}" onclick="setTheme('${t}')" title="${t}"><i class="fa-solid ${themeIcons[t]}"></i></button>`;
            });
            themeHTML += `</div>`;

            if (currentUser) {
                nav.innerHTML = `
                    <span class="user-info-nav">${currentUser.username}</span>
                    <button class="nav-btn" onclick="switchView('profile')"><i class="fa-regular fa-user"></i></button>
                    <button class="nav-btn" onclick="switchView('create')"><i class="fa-solid fa-pen-nib"></i></button>
                    <button class="nav-btn" onclick="handleLogout()" style="border:none;"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                    ${themeHTML}`;
            } else {
                nav.innerHTML = `<button class="nav-btn" onclick="switchView('login')">登录</button>${themeHTML}`;
            }
        }

        // ==================== 用户系统 ====================
        // (3) 注册后自动登录
        function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!username || !password) { alert("用户名和密码不能为空"); return; }
            if (users.find(u => u.username === username)) { alert("该用户名已被注册"); return; }
            
            const newUser = { username, password, color: getRandomColor(), collections: [] };
            users.push(newUser);
            localStorage.setItem('beyTalkUsers', JSON.stringify(users));
            
            // 自动登录
            currentUser = newUser;
            localStorage.setItem('beyTalkUser', JSON.stringify(newUser));
            updateNav(); 
            switchView('home'); 
            renderPosts();
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                // 兼容旧数据：确保有 collections 字段
                if (!user.collections) user.collections = [];
                currentUser = user;
                localStorage.setItem('beyTalkUser', JSON.stringify(user));
                updateNav(); switchView('home'); renderPosts();
            } else { alert("用户名或密码错误"); }
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('beyTalkUser');
            updateNav(); switchView('home');
        }

        // ==================== 帖子渲染 (纯DOM API) ====================
        function renderPosts(targetList = null) {
            const postListEl = targetList || document.getElementById('postList');
            if (!postListEl) return;
            
            const searchKeyword = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
            postListEl.innerHTML = '';

            const filteredPosts = (targetList ? posts : posts).filter(post => {
                if (targetList) return true; // 个人主页传入的已是过滤后的列表
                if (!searchKeyword) return true;
                return post.content.toLowerCase().includes(searchKeyword) || post.author.toLowerCase().includes(searchKeyword);
            });

            if (filteredPosts.length === 0) {
                const emptyTip = document.createElement('div');
                emptyTip.style.cssText = 'text-align:center; color:var(--text-placeholder); padding:40px; font-size:14px;';
                emptyTip.textContent = targetList ? '暂无相关记录' : '暂无相关帖子';
                postListEl.appendChild(emptyTip);
                return;
            }

            filteredPosts.forEach(post => {
                if (!post.comments) post.comments = [];
                const isOwner = currentUser && currentUser.username === post.author;
                const isCollected = currentUser && currentUser.collections && currentUser.collections.includes(post.id);

                const card = document.createElement('div');
                card.className = 'post-card';

                // Header
                const header = document.createElement('div');
                header.className = 'post-header';
                const userObj = users.find(u => u.username === post.author);
                const avatarColor = userObj ? userObj.color : post.avatarColor;
                header.innerHTML = `
                    <div class="avatar" style="background-color: ${avatarColor}">${post.author.charAt(0)}</div>
                    <div class="user-info"><span onclick="viewUserProfile('${post.author}')">${post.author}</span><small>${post.time}</small></div>
                `;
                card.appendChild(header);

                // Content
                const content = document.createElement('div');
                content.className = 'post-content';
                content.textContent = post.content;
                card.appendChild(content);

                // Footer
                const footer = document.createElement('div');
                footer.className = 'post-footer';

                // Like
                const likeBtn = document.createElement('button');
                likeBtn.className = `action-btn ${post.isLiked ? 'liked' : ''}`;
                likeBtn.innerHTML = `<i class="fa-${post.isLiked ? 'solid' : 'regular'} fa-heart"></i><span>${post.likes}</span>`;
                likeBtn.addEventListener('click', () => {
                    post.isLiked = !post.isLiked;
                    post.likes += post.isLiked ? 1 : -1;
                    saveData();
                    renderPosts(targetList);
                });
                footer.appendChild(likeBtn);

                // Comment Toggle
                const commentToggleBtn = document.createElement('button');
                commentToggleBtn.className = 'action-btn';
                commentToggleBtn.innerHTML = `<i class="fa-regular fa-comment"></i><span>${post.comments.length}</span>`;
                footer.appendChild(commentToggleBtn);

                // (6) Collect Button (替代 Share)
                const collectBtn = document.createElement('button');
                collectBtn.className = `action-btn ${isCollected ? 'collected' : ''}`;
                collectBtn.innerHTML = `<i class="fa-${isCollected ? 'solid' : 'regular'} fa-bookmark"></i><span>${isCollected ? '已藏' : '收藏'}</span>`;
                collectBtn.addEventListener('click', () => {
                    if (!currentUser) { alert("请先登录"); switchView('login'); return; }
                    toggleCollection(post.id);
                    renderPosts(targetList);
                });
                footer.appendChild(collectBtn);

                // Delete
                if (isOwner) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'action-btn delete-btn';
                    delBtn.innerHTML = `<i class="fa-regular fa-trash-can"></i>`;
                    delBtn.addEventListener('click', () => {
                        if (confirm("确定要删除这条帖子吗？")) {
                            posts = posts.filter(p => p.id !== post.id);
                            saveData();
                            renderPosts(targetList);
                            if (document.getElementById('profileView').classList.contains('active')) renderProfile();
                        }
                    });
                    footer.appendChild(delBtn);
                }

                card.appendChild(footer);

                // Comments Section
                const commentsSection = document.createElement('div');
                commentsSection.className = 'comments-section';
                const commentInputRow = document.createElement('div');
                commentInputRow.className = 'comment-input-row';
                const commentInput = document.createElement('input');
                commentInput.type = 'text';
                commentInput.placeholder = '写下你的评论...';
                const commentSubmitBtn = document.createElement('button');
                commentSubmitBtn.textContent = '发表';
                
                const submitComment = () => {
                    if (!currentUser) { alert("请先登录"); switchView('login'); return; }
                    const text = commentInput.value.trim();
                    if (!text) return;
                    post.comments.push({ author: currentUser.username, text, time: "刚刚" });
                    saveData();
                    renderPosts(targetList);
                };
                commentSubmitBtn.addEventListener('click', submitComment);
                commentInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitComment(); });
                
                commentInputRow.appendChild(commentInput);
                commentInputRow.appendChild(commentSubmitBtn);
                commentsSection.appendChild(commentInputRow);

                const commentListDiv = document.createElement('div');
                post.comments.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'comment-item';
                    item.innerHTML = `<strong>${c.author}</strong><p>${c.text}</p><small>${c.time}</small>`;
                    commentListDiv.appendChild(item);
                });
                commentsSection.appendChild(commentListDiv);
                card.appendChild(commentsSection);

                commentToggleBtn.addEventListener('click', () => commentsSection.classList.toggle('open'));
                postListEl.appendChild(card);
            });
        }

        // ==================== 收藏与数据持久化 ====================
        function toggleCollection(postId) {
            if (!currentUser) return;
            // 同步内存中的 currentUser
            const userIdx = users.findIndex(u => u.username === currentUser.username);
            if (!users[userIdx].collections) users[userIdx].collections = [];
            
            const idx = users[userIdx].collections.indexOf(postId);
            if (idx > -1) users[userIdx].collections.splice(idx, 1);
            else users[userIdx].collections.push(postId);
            
            currentUser = users[userIdx];
            saveData();
        }

        function saveData() {
            localStorage.setItem('beyTalkPosts', JSON.stringify(posts));
            localStorage.setItem('beyTalkUsers', JSON.stringify(users));
            localStorage.setItem('beyTalkUser', JSON.stringify(currentUser));
        }

        // ==================== 发帖 ====================
        function createPost() {
            if (!currentUser) { alert("请先登录"); switchView('login'); return; }
            const content = document.getElementById('newPostInput').value.trim();
            if (!content) { alert("内容不能为空"); return; }
            posts.unshift({
                id: Date.now(), author: currentUser.username, avatarColor: currentUser.color,
                time: "刚刚", content, likes: 0, isLiked: false, comments: []
            });
            saveData();
            document.getElementById('newPostInput').value = '';
            switchView('home'); renderPosts();
        }

        // ==================== (5) 个人主页 ====================
        function viewUserProfile(username) {
            // 简化版：如果是自己则进入个人中心，他人暂不展示
            if (currentUser && currentUser.username === username) switchView('profile');
        }

        function renderProfile() {
            if (!currentUser) { switchView('login'); return; }
            const container = document.getElementById('profileContent');
            container.innerHTML = '';

            // Header
            const header = document.createElement('div');
            header.className = 'profile-header';
            header.innerHTML = `
                <div class="profile-avatar" style="background:${currentUser.color}">${currentUser.username.charAt(0)}</div>
                <div class="profile-info">
                    <h2>${currentUser.username}</h2>
                    <p>已发布 ${posts.filter(p=>p.author===currentUser.username).length} 条帖子 · 收藏 ${currentUser.collections?.length || 0} 条内容</p>
                </div>
            `;
            container.appendChild(header);

            // Tabs
            const tabs = document.createElement('div');
            tabs.className = 'profile-tabs';
            ['posts', 'collected', 'settings'].forEach(key => {
                const labels = { posts: '我的帖子', collected: '我的收藏', settings: '账号设置' };
                const btn = document.createElement('button');
                btn.className = `tab-btn ${profileTab === key ? 'active' : ''}`;
                btn.textContent = labels[key];
                btn.addEventListener('click', () => { profileTab = key; renderProfile(); });
                tabs.appendChild(btn);
            });
            container.appendChild(tabs);

            // Content Area
            const contentArea = document.createElement('div');
            contentArea.id = 'profileDynamicContent';
            container.appendChild(contentArea);

            if (profileTab === 'posts') {
                const myPosts = posts.filter(p => p.author === currentUser.username);
                renderPosts.call(null, contentArea); // 复用渲染逻辑，但需手动填充
                // 由于 renderPosts 默认读全局 list，这里手动触发一次针对 contentArea 的渲染
                // 为保持纯净，我们直接调用一个内部变体
                renderFilteredPosts(myPosts, contentArea);
            } else if (profileTab === 'collected') {
                const collectedIds = currentUser.collections || [];
                const collectedPosts = posts.filter(p => collectedIds.includes(p.id));
                renderFilteredPosts(collectedPosts, contentArea);
            } else if (profileTab === 'settings') {
                renderSettings(contentArea);
            }
        }

        function renderFilteredPosts(list, container) {
            container.innerHTML = '';
            if (list.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:var(--text-placeholder);padding:40px;">暂无记录</div>';
                return;
            }
            // 临时替换全局 posts 以便 renderPosts 使用，渲染后恢复（或者更好的方式是传参）
            // 这里采用传参方式，修改 renderPosts 支持第二参数
            // 为免污染，我们创建一个临时容器让 renderPosts 渲染
            const tempWrapper = document.createElement('div');
            tempWrapper.className = 'post-list';
            container.appendChild(tempWrapper);
            
            // 手动执行渲染逻辑的子集以避免递归
            list.forEach(post => {
                // 复用主渲染逻辑过于复杂，这里简化调用
                // 实际上我们可以直接调用 renderPosts 并传入目标容器
            });
            // 重新设计：renderPosts 接受 filterFn
            renderPostListToContainer(list, tempWrapper);
        }

        function renderPostListToContainer(postList, container) {
            container.innerHTML = '';
            if (postList.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:var(--text-placeholder);padding:40px;font-size:14px;">暂无记录</div>';
                return;
            }
            // 复用核心渲染逻辑：通过临时修改搜索框不可见或直接构建
            // 最稳妥方式：提取 buildPostCard 函数
            postList.forEach(post => buildAndAppendCard(post, container));
        }

        function buildAndAppendCard(post, container) {
            if (!post.comments) post.comments = [];
            const isOwner = currentUser && currentUser.username === post.author;
            const isCollected = currentUser && currentUser.collections && currentUser.collections.includes(post.id);

            const card = document.createElement('div');
            card.className = 'post-card';
            const userObj = users.find(u => u.username === post.author);
            const avatarColor = userObj ? userObj.color : post.avatarColor;

            card.innerHTML = `
                <div class="post-header">
                    <div class="avatar" style="background-color: ${avatarColor}">${post.author.charAt(0)}</div>
                    <div class="user-info"><span>${post.author}</span><small>${post.time}</small></div>
                </div>
                <div class="post-content"></div>
                <div class="post-footer"></div>
            `;
            card.querySelector('.post-content').textContent = post.content;

            const footer = card.querySelector('.post-footer');
            
            // Like
            const likeBtn = document.createElement('button');
            likeBtn.className = `action-btn ${post.isLiked ? 'liked' : ''}`;
            likeBtn.innerHTML = `<i class="fa-${post.isLiked ? 'solid' : 'regular'} fa-heart"></i><span>${post.likes}</span>`;
            likeBtn.onclick = () => { post.isLiked=!post.isLiked; post.likes+=post.isLiked?1:-1; saveData(); renderProfile(); };
            footer.appendChild(likeBtn);

            // Collect
            const collectBtn = document.createElement('button');
            collectBtn.className = `action-btn ${isCollected ? 'collected' : ''}`;
            collectBtn.innerHTML = `<i class="fa-${isCollected ? 'solid' : 'regular'} fa-bookmark"></i><span>${isCollected?'已藏':'收藏'}</span>`;
            collectBtn.onclick = () => { if(!currentUser){alert("请先登录");return;} toggleCollection(post.id); renderProfile(); };
            footer.appendChild(collectBtn);

            // Delete
            if (isOwner) {
                const delBtn = document.createElement('button');
                delBtn.className = 'action-btn delete-btn';
                delBtn.innerHTML = `<i class="fa-regular fa-trash-can"></i>`;
                delBtn.onclick = () => { if(confirm("删除此帖？")){ posts=posts.filter(p=>p.id!==post.id); saveData(); renderProfile(); } };
                footer.appendChild(delBtn);
            }

            container.appendChild(card);
        }

        function renderSettings(container) {
            const form = document.createElement('div');
            form.className = 'pwd-form';
            form.innerHTML = `
                <h3 style="margin-bottom:16px;font-size:16px;font-weight:700;">修改密码</h3>
                <div class="form-group"><label>当前密码</label><input type="password" id="oldPwd"></div>
                <div class="form-group"><label>新密码</label><input type="password" id="newPwd"></div>
                <div class="form-group"><label>确认新密码</label><input type="password" id="confirmPwd"></div>
                <button class="submit-btn" id="changePwdBtn">确认修改</button>
            `;
            container.appendChild(form);

            document.getElementById('changePwdBtn').addEventListener('click', () => {
                const oldPwd = document.getElementById('oldPwd').value;
                const newPwd = document.getElementById('newPwd').value;
                const confirmPwd = document.getElementById('confirmPwd').value;

                if (oldPwd !== currentUser.password) { alert("当前密码错误"); return; }
                if (!newPwd || newPwd.length < 4) { alert("新密码至少4位"); return; }
                if (newPwd !== confirmPwd) { alert("两次输入的新密码不一致"); return; }

                const userIdx = users.findIndex(u => u.username === currentUser.username);
                users[userIdx].password = newPwd;
                currentUser.password = newPwd;
                saveData();
                alert("密码修改成功！");
                document.getElementById('oldPwd').value = '';
                document.getElementById('newPwd').value = '';
                document.getElementById('confirmPwd').value = '';
            });
        }

        // ==================== 初始化 ====================
        function init() {
            setTheme(currentTheme);
            updateNav();
            renderPosts();
            document.getElementById('searchInput')?.addEventListener('input', () => renderPosts());
        }

        window.onload = init;
    </script>
</body>
</html>
